<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PNR Status - RailGo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <style>
        * {
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }

        body {
            background-color: #f0f4f8;
            color: #333;
            padding-top: 80px;
            padding-bottom: 50px;
            overflow-x: hidden;
        }
        
        .dark-mode {
            background-color: #0f172a;
            color: #f1f5f9;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ── Cards ── */
        .glass-card {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
            border: 1px solid rgba(0, 0, 0, 0.03);
            position: relative;
            overflow: hidden;
        }
        
        .dark-mode .glass-card {
            background: #1e293b;
            border-color: rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        /* ── Header ── */
        .pnr-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed rgba(0,0,0,0.1);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        
        .dark-mode .pnr-header {
            border-bottom-color: rgba(255,255,255,0.1);
        }

        .pnr-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1a73e8;
            margin: 0;
            letter-spacing: 1px;
        }

        .pnr-status-badge {
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-confirmed { background: rgba(46, 125, 50, 0.1); color: #2e7d32; border: 1px solid #2e7d32; }
        .status-waitlisted { background: rgba(230, 81, 0, 0.1); color: #e65100; border: 1px solid #e65100; }
        .status-cancelled { background: rgba(198, 40, 40, 0.1); color: #c62828; border: 1px solid #c62828; }

        /* ── Train Info ── */
        .train-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .info-cell {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 0.8rem;
            color: #64748b;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        
        .dark-mode .info-label { color: #94a3b8; }

        .info-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
        }
        
        .dark-mode .info-value { color: #f8fafc; }

        .route-visual {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }
        
        .dark-mode .route-visual {
            background: rgba(15, 23, 42, 0.5);
        }

        .station { text-align: center; }
        .station-code { font-size: 1.4rem; font-weight: 800; color: #1e293b; }
        .dark-mode .station-code { color: #f8fafc; }
        .station-name { font-size: 0.85rem; color: #64748b; font-weight: 500; }
        .dark-mode .station-name { color: #94a3b8; }
        
        .route-line {
            flex: 1;
            height: 2px;
            background: #cbd5e1;
            margin: 0 20px;
            position: relative;
        }
        .dark-mode .route-line { background: #475569; }
        
        .route-line::before, .route-line::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #1a73e8;
            top: -3px;
        }
        .route-line::before { left: 0; }
        .route-line::after { right: 0; }
        
        .route-icon {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: #f8fafc;
            padding: 0 10px;
            color: #1a73e8;
            font-size: 1.2rem;
        }
        .dark-mode .route-icon { background: #131c31; }

        /* ── Passengers ── */
        .passenger-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        
        .passenger-table th {
            text-align: left;
            padding: 12px 16px;
            font-size: 0.85rem;
            color: #64748b;
            text-transform: uppercase;
            font-weight: 700;
            border-bottom: 2px solid #e2e8f0;
        }
        .dark-mode .passenger-table th { border-bottom-color: #334155; color: #94a3b8; }
        
        .passenger-table td {
            padding: 16px;
            font-size: 1rem;
            font-weight: 500;
            border-bottom: 1px solid #f1f5f9;
            color: #1e293b;
        }
        .dark-mode .passenger-table td { border-bottom-color: rgba(255,255,255,0.05); color: #f8fafc; }
        
        .passenger-table tr:last-child td { border-bottom: none; }
        
        .seat-badge {
            background: rgba(26, 115, 232, 0.1);
            color: #1a73e8;
            padding: 5px 12px;
            border-radius: 6px;
            font-weight: 700;
        }

        /* ── Loader & Errors ── */
        #loading { display: none; text-align: center; padding: 60px 20px; }
        .spinner-border { color: #1a73e8; width: 3rem; height: 3rem; }
        #error-msg { display: none; margin-bottom: 20px; border-radius: 12px; }
        #content { display: none; }
        
        /* ── Mobile Queries ── */
        @media (max-width: 768px) {
            body { padding-top: 72px; padding-bottom: 30px; }
            .container { padding: 15px; }
            .pnr-header { flex-direction: column; align-items: flex-start; gap: 15px; }
            .pnr-title { font-size: 1.5rem; }
            .glass-card { padding: 18px 16px; }
            .train-info-grid { grid-template-columns: 1fr 1fr; gap: 15px; }
            .route-visual { padding: 15px; }
            .station-code { font-size: 1.2rem; }
            .station-name { font-size: 0.75rem; }
            .route-icon { font-size: 1rem; padding: 0 5px; }
            
            /* Responsive table */
            .passenger-table th, .passenger-table td { padding: 10px 8px; font-size: 0.9rem; }
            .seat-badge { padding: 4px 8px; font-size: 0.85rem; }
        }
        @media (max-width: 480px) {
            .train-info-grid { grid-template-columns: 1fr; gap: 12px; }
            .route-visual { flex-direction: column; gap: 15px; text-align: center; }
            .route-line { height: 20px; width: 2px; margin: 0 auto; }
            .route-line::before { top: 0; left: -3px; }
            .route-line::after { bottom: 0; left: -3px; top: auto; }
            .route-icon { top: 50%; left: 50%; transform: translate(-50%, -50%); }
            
            /* Hide non-essential columns on mobile table */
            .passenger-table th:nth-child(3), .passenger-table td:nth-child(3),
            .passenger-table th:nth-child(4), .passenger-table td:nth-child(4) { display: none; }
        }
    </style>
</head>

<body class="light-mode">
    <div id="universal-header"></div>

    <div class="container">
        <!-- Error Message -->
        <div class="alert alert-danger shadow-sm border-0" id="error-msg"></div>

        <!-- Loading -->
        <div id="loading">
            <div class="spinner-border" role="status"></div>
            <div class="mt-3 fs-5 fw-bold text-muted">Fetching PNR details...</div>
        </div>

        <!-- Content -->
        <div id="content">
            <!-- Header Card -->
            <div class="glass-card">
                <div class="pnr-header">
                    <div>
                        <div class="info-label">PNR Number</div>
                        <h1 class="pnr-title" id="pnr">----------</h1>
                    </div>
                    <div class="pnr-status-badge" id="status-badge">----</div>
                </div>
                
                <div class="train-info-grid">
                    <div class="info-cell">
                        <span class="info-label">Train Name & No.</span>
                        <span class="info-value"><span id="train-number"></span> - <span id="train-name"></span></span>
                    </div>
                    <div class="info-cell">
                        <span class="info-label">Journey Date</span>
                        <span class="info-value" id="journey-date"></span>
                    </div>
                    <div class="info-cell">
                        <span class="info-label">Class</span>
                        <span class="info-value" id="train-class"></span>
                    </div>
                    <div class="info-cell">
                        <span class="info-label">Total Amount</span>
                        <span class="info-value">₹<span id="amount"></span></span>
                    </div>
                </div>

                <div class="route-visual">
                    <div class="station">
                        <div class="station-code" id="src-code"></div>
                        <div class="station-name" id="src-name"></div>
                        <div class="fw-bold mt-1 text-primary" id="dep-time"></div>
                    </div>
                    <div class="route-line">
                        <i class="bi bi-train-front route-icon"></i>
                    </div>
                    <div class="station">
                        <div class="station-code" id="dst-code"></div>
                        <div class="station-name" id="dst-name"></div>
                        <div class="fw-bold mt-1 text-primary" id="arr-time"></div>
                    </div>
                </div>
            </div>

            <!-- Passengers Card -->
            <div class="glass-card">
                <h4 class="fw-bold mb-3"><i class="bi bi-people-fill me-2 text-primary"></i>Passenger Details</h4>
                <div class="table-responsive">
                    <table class="passenger-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th>Age</th>
                                <th>Gender</th>
                                <th>Status / Seat given</th>
                            </tr>
                        </thead>
                        <tbody id="passenger-list">
                            <!-- Passengers injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
            

        </div>
    </div>

    <script src="common.js?v=4"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Theme Sync
            const theme = localStorage.getItem('theme') || 'light';
            document.body.className = theme === 'dark' ? 'dark-mode' : 'light-mode';

            const params = new URLSearchParams(window.location.search);
            const pnrParam = params.get('pnr');

            if (pnrParam && pnrParam.length >= 5) {
                fetchPnrDetails(pnrParam.trim());
            } else {
                showError('<i class="bi bi-exclamation-triangle-fill me-2"></i>Please provide a valid PNR number from the <a href="index.html" class="alert-link"><strong>Home page</strong></a>.');
            }
        });

        async function fetchPnrDetails(pnr) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('content').style.display = 'none';
            document.getElementById('error-msg').style.display = 'none';

            try {
                const response = await fetch(`/api/pnr-status/check/${encodeURIComponent(pnr)}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Failed to fetch PNR status or PNR not found');
                }

                renderDetails(data);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                showError(err.message || 'An error occurred while fetching the PNR details.');
            }
        }

        function renderDetails(data) {
            // Header
            document.getElementById('pnr').textContent = data.pnr;
            
            // Status Badge Formatting
            const badge = document.getElementById('status-badge');
            const statusStr = data.status.toUpperCase();
            badge.textContent = statusStr;
            badge.className = 'pnr-status-badge'; // reset
            
            if (statusStr.includes('CONFIRM')) {
                badge.classList.add('status-confirmed');
            } else if (statusStr.includes('WAIT') || statusStr.includes('WL')) {
                badge.classList.add('status-waitlisted');
            } else if (statusStr.includes('CANCEL')) {
                badge.classList.add('status-cancelled');
            } else {
                badge.classList.add('status-waitlisted'); // fallback
            }

            // Train Details
            const t = data.train_instance.train;
            document.getElementById('train-number').textContent = t.train_number;
            document.getElementById('train-name').textContent = t.name;
            
            // Date formatting
            const jDate = new Date(data.train_instance.journey_date);
            const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
            document.getElementById('journey-date').textContent = jDate.toLocaleDateString(undefined, options);
            
            document.getElementById('train-class').textContent = data.train_class.class_master.name + ' (' + data.train_class.class_master.code + ')';
            document.getElementById('amount').textContent = data.total_amount;

            // Route Details
            document.getElementById('src-code').textContent = t.source_station.code;
            document.getElementById('src-name').textContent = t.source_station.name;
            document.getElementById('dep-time').textContent = t.departure_time;

            document.getElementById('dst-code').textContent = t.destination_station.code;
            document.getElementById('dst-name').textContent = t.destination_station.name;
            document.getElementById('arr-time').textContent = t.arrival_time;

            // Passenger List
            const tbody = document.getElementById('passenger-list');
            tbody.innerHTML = '';
            
            data.passengers.forEach((p, idx) => {
                const tr = document.createElement('tr');
                
                // Determine seat status / text
                let seatHtml = '<span class="text-muted">N/A</span>';
                if (statusStr.includes('CANCEL')) {
                    seatHtml = '<span class="text-danger fw-bold">Cancelled</span>';
                } else if (p.seat_number) {
                    seatHtml = `<span class="seat-badge">${p.seat_number}</span>`;
                } else if (statusStr.includes('CONFIRM')) {
                    seatHtml = `<span class="seat-badge">Confirmed</span>`;
                } else {
                    seatHtml = `<span class="fw-bold text-warning">Waitlisted</span>`;
                }

                tr.innerHTML = `
                    <td>${idx + 1}</td>
                    <td><i class="bi bi-person-circle me-2 text-primary opacity-75"></i>${p.name}</td>
                    <td>${p.age}</td>
                    <td>${p.gender}</td>
                    <td>${seatHtml}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function showError(msg) {
            const errorEl = document.getElementById('error-msg');
            errorEl.style.display = 'block';
            errorEl.innerHTML = msg;
        }
    </script>
</body>
</html>
